# --- GOVERNANCE ENGINE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: governance-engine
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: governance-engine
  template:
    metadata:
      labels:
        app: governance-engine
    spec:
      containers:
        - name: governance-engine
          image: ${REGISTRY}/governance-engine:${TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
---
apiVersion: v1
kind: Service
metadata:
  name: governance-engine
  namespace: ${NAMESPACE}
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
  selector:
    app: governance-engine
---
# --- AGENT ORCHESTRATOR ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-orchestrator
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-orchestrator
  template:
    metadata:
      labels:
        app: agent-orchestrator
    spec:
      containers:
        - name: agent-orchestrator
          image: ${REGISTRY}/agent-orchestrator:${TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: GOVERNANCE_ENGINE_URL
              value: "http://governance-engine:8000"
            - name: REDIS_URL
              value: "redis://:${REDIS_PASSWORD}@redis:6379/0"
            - name: LLM_GATEWAY_URL
              value: "http://litellm:4000/v1"
            - name: LLM_MODEL
              value: "llama2"
---
apiVersion: v1
kind: Service
metadata:
  name: agent-orchestrator
  namespace: ${NAMESPACE}
spec:
  type: NodePort
  ports:
    - port: 8001
      targetPort: 8001
      nodePort: 30081
  selector:
    app: agent-orchestrator
---
# --- DASHBOARD FRONTEND ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: ${REGISTRY}/dashboard:${TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: ${NAMESPACE}
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30082
  selector:
    app: dashboard
# --- OLLAMA (External LAN Service Mapping) ---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ${NAMESPACE}
spec:
  type: ExternalName
  externalName: ${OLLAMA_HOST_IP}
